<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Spanel</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Inter', sans-serif;
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #06080f;
            color: #e2e8f0;
        }
        .login-card {
            width: 100%;
            max-width: 380px;
            margin: 1rem;
            background: rgba(15,23,42,.8);
            border: 1px solid rgba(255,255,255,.06);
            border-radius: 18px;
            padding: 2.5rem 2rem;
            backdrop-filter: blur(20px);
            box-shadow: 0 8px 40px rgba(0,0,0,.5);
        }
        .brand {
            text-align: center;
            margin-bottom: 2rem;
        }
        .brand i {
            font-size: 2.5rem;
            background: linear-gradient(135deg,#6366f1,#818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: block;
            margin-bottom: .75rem;
        }
        .brand h1 {
            font-size: 1.6rem;
            font-weight: 700;
            background: linear-gradient(135deg,#6366f1,#818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .brand p { font-size: .85rem; color: #475569; margin-top: .25rem; }
        .field { margin-bottom: 1.25rem; }
        .field label {
            display: block; font-size: .78rem; color: #94a3b8;
            margin-bottom: .4rem; font-weight: 500;
        }
        .field input {
            width: 100%;
            padding: .7rem .85rem;
            background: rgba(0,0,0,.3);
            border: 1px solid rgba(255,255,255,.08);
            border-radius: 10px;
            color: #e2e8f0;
            font-family: inherit;
            font-size: .9rem;
            outline: none;
            transition: border-color .2s;
        }
        .field input:focus { border-color: #6366f1; }
        .login-btn {
            width: 100%;
            padding: .75rem;
            background: linear-gradient(135deg,#6366f1,#818cf8);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-family: inherit;
            font-size: .95rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity .15s, transform .1s;
            margin-top: .5rem;
        }
        .login-btn:hover { opacity:.9; }
        .login-btn:active { transform:scale(.98); }
        .error-msg {
            display: none;
            background: rgba(244,63,94,.1);
            border: 1px solid rgba(244,63,94,.3);
            color: #f43f5e;
            padding: .6rem .8rem;
            border-radius: 8px;
            font-size: .8rem;
            margin-bottom: 1rem;
            text-align: center;
        }
        .error-msg.show { display: block; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="brand">
            <i class="fa-solid fa-rocket"></i>
            <h1 id="login-brand">Spanel</h1>
            <p>System Monitoring Panel</p>
        </div>

        <div id="error-msg" class="error-msg"></div>

        <form id="login-form" onsubmit="return doLogin(event)">
            <div class="field">
                <label>Username</label>
                <input type="text" id="inp-user" autocomplete="username" autofocus required>
            </div>
            <div class="field">
                <label>Password</label>
                <input type="password" id="inp-pass" autocomplete="current-password" required>
            </div>
            <button type="submit" class="login-btn">
                <i class="fa-solid fa-right-to-bracket"></i> Sign In
            </button>
        </form>
    </div>

    <script>
        // Try to load panel name
        fetch('/api/settings').then(r => r.ok ? r.json() : null).then(d => {
            if (d && d.panel_name) {
                document.getElementById('login-brand').textContent = d.panel_name;
                document.title = 'Login — ' + d.panel_name;
            }
        }).catch(()=>{});

        async function doLogin(e) {
            e.preventDefault();
            const user = document.getElementById('inp-user').value.trim();
            const pass = document.getElementById('inp-pass').value;
            const errEl = document.getElementById('error-msg');
            errEl.classList.remove('show');

            try {
                const res = await fetch('/api/auth/login', {
                    method:'POST',
                    headers:{'Content-Type':'application/json'},
                    body: JSON.stringify({ username: user, password: pass })
                });
                if (res.ok) {
                    window.location.href = '/';
                } else {
                    const d = await res.json();
                    errEl.textContent = d.detail || 'Login failed';
                    errEl.classList.add('show');
                }
            } catch(err) {
                errEl.textContent = 'Connection error';
                errEl.classList.add('show');
            }
            return false;
        }
    </script>
</body>
</html>
